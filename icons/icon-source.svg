<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: deep indigo rounded rect (will be cropped to circle by iOS) -->
  <rect width="512" height="512" rx="112" fill="#4338ca"/>

  <!-- Clothes hanger: hook + bar + shoulders -->
  <!-- Hook (small loop at top center) -->
  <path d="M256 88 C256 72 268 62 282 66 C296 70 298 84 290 94 C282 104 264 108 256 120"
    fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Shoulder bar: trapezoid shape from center down to wide shoulders -->
  <path d="M256 120 L148 248 A6 6 0 0 0 150 258 L180 258 L180 248 L256 168 L332 248 L332 258 L362 258 A6 6 0 0 0 364 248 Z"
    fill="white"/>

  <!-- Horizontal crossbar at bottom of shoulders -->
  <rect x="138" y="248" width="236" height="22" rx="11" fill="white"/>

  <!-- T-shirt body hanging from hanger: simple tee silhouette below -->
  <!-- Left sleeve -->
  <path d="M180 270 L120 310 L120 340 L160 340 L180 310 Z" fill="white" opacity="0.75"/>
  <!-- Right sleeve -->
  <path d="M332 270 L392 310 L392 340 L352 340 L332 310 Z" fill="white" opacity="0.75"/>
  <!-- Body -->
  <rect x="180" y="270" width="152" height="154" rx="8" fill="white" opacity="0.75"/>

  <!-- Pocket detail on tee -->
  <rect x="222" y="300" width="40" height="34" rx="4" fill="#4338ca" opacity="0.5"/>
</svg>
